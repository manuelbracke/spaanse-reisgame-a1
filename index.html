    .introCards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.75rem;margin-top:1rem} .metricGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:.65rem;margin-top:.85rem} .metric{border:1px solid var(--line);background:#fff;border-radius:18px;padding:.8rem} .metric strong{display:block;font-size:clamp(1.25rem,5vw,1.85rem);letter-spacing:-.04em} .progressOuter{height:.7rem;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:.55rem} .progressInner{height:100%;width:0;background:var(--blue);border-radius:999px;transition:width .25s ease}

<body>
<div class="wrap">
  <div id="fatal" class="fatal" role="alert"></div>
  <header>
    <div class="topbar">
      <div class="brand"><div class="logo" aria-hidden="true">🧳</div><div class="brandText"><h1 id="appTitle">Pasaporte A1</h1><p id="tagline" class="small"></p><span id="version" class="version"></span></div></div>
      <div class="topActions" aria-label="App actions"><button id="installBtn" type="button" class="secondary">Install</button><button id="settingsBtn" type="button" class="secondary">Settings</button><button id="audioToggle" type="button" class="secondary">🔊</button></div>
    </div>
    <div class="hud" aria-label="Game status">
      <div class="chip" aria-live="polite">💶 <span id="hudMoney">€500</span></div>
      <div class="chip" aria-live="polite">🔥 <span id="hudCombo">x1.00</span></div>
      <div class="chip" aria-live="polite">🛂 <span id="hudStamps">0/4</span></div>
      <div class="chip" aria-live="polite">🧠 <span id="hudDue">0</span></div>
      <div class="chip"><span id="netDot" class="statusDot"></span><span id="netText">Online</span></div>
    </div>
  </header>

  <main>
    <section id="start" class="screen active">
      <div class="hero">
        <div class="panel">
          <h2 id="startTitle"></h2>
          <p id="startText" class="small" style="margin-top:.55rem"></p>
          <div class="actions"><button id="startGame" type="button"></button><button id="startSettings" type="button" class="secondary"></button></div>
          <div class="introCards gameFirstNote">
            <div class="mini"><h3 id="onboard1Title"></h3><p id="onboard1Text" class="small" style="margin-top:.35rem"></p></div>
            <div class="mini"><h3 id="onboard2Title"></h3><p id="onboard2Text" class="small" style="margin-top:.35rem"></p></div>
            <div class="mini"><h3 id="onboard3Title"></h3><p id="onboard3Text" class="small" style="margin-top:.35rem"></p></div>
          </div>
        </div>
        <aside class="stack">
          <div class="mini"><h3 id="dailyGoalStart"></h3><p id="dailyStartText" class="small" style="margin-top:.35rem"></p><div class="progressOuter"><div id="dailyStartBar" class="progressInner"></div></div></div>
          <div class="mini"><h3>PWA</h3><p id="installHelp" class="small" style="margin-top:.35rem"></p><p id="offlineReady" class="small" style="margin-top:.55rem"></p></div>
        </aside>
      </div>
    </section>

    <section id="home" class="screen">
      <div class="hero">
        <div class="panel">
          <h2 id="homeTitle"></h2><p id="mapIntro" class="small" style="margin-top:.45rem"></p>
          <div id="countries" class="countries"></div>
          <div class="metricGrid gameFirstNote">
            <div class="metric"><span class="tiny" id="dailyGoalLabel"></span><strong id="dailyDone">0/10</strong><div class="progressOuter"><div id="dailyBar" class="progressInner"></div></div></div>
            <div class="metric"><span class="tiny" id="streakLabel"></span><strong id="streakValue">0</strong></div>
            <div class="metric"><span class="tiny" id="knownLabel"></span><strong id="knownValue">0</strong></div>
            <div class="metric"><span class="tiny" id="dueLabel"></span><strong id="dueValue">0</strong></div>
          </div>
          <div class="actions"><button id="finishBtn" type="button" class="secondary"></button><button id="exportBtn" type="button" class="secondary"></button><button id="resetBtn" type="button" class="danger"></button></div>
        </div>
        <aside class="stack"><div class="mini"><h3 id="howTitle"></h3><p id="howText" class="small" style="margin-top:.35rem"></p></div><div class="mini"><h3 id="reviewTitle"></h3><div id="reviewList" class="list"></div></div></aside>
      </div>
    </section>

    <section id="question" class="screen">
      <div class="grid">
        <div class="panel">
          <p id="questionMeta" class="small"></p>
          <div class="task"><p id="sentence" class="small sentence"></p><div id="prompt" class="questionLine"></div><div class="audioRow"><button id="speakWord" type="button" class="secondary"></button><button id="speakSentence" type="button" class="secondary"></button></div><div id="modeChooser" class="actions"><button id="chooseMc" type="button"></button><button id="chooseType" type="button" class="secondary"></button></div><div id="answerArea"></div><div id="feedback" class="feedback" role="status" aria-live="polite"></div><div id="nextBox" class="actions hidden"><button id="nextQuestion" type="button"></button></div></div>
          <div class="scene gameFirstNote"><div id="scenarioEmoji" class="avatar">🏨</div><div><h2 id="scenarioTitle"></h2><p id="scenarioSetup" class="small" style="margin-top:.3rem"></p></div></div>
        </div>
        <aside class="stack"><div class="mini"><h3 id="dailySideTitle"></h3><p id="dailySide" class="small" style="margin-top:.35rem"></p><div class="progressOuter"><div id="dailySideBar" class="progressInner"></div></div></div><div class="mini"><h3 id="wordBoxTitle">🧠</h3><p id="wordBox" class="small" style="margin-top:.35rem"></p></div></aside>
      </div>
    </section>

    <section id="speed" class="screen"><div class="panel"><div class="speedHead"><div><h2 id="speedTitle"></h2><p id="speedIntro" class="small"></p></div><div id="timer" class="timer">30</div></div><div class="task"><h2 id="speedQuestion"></h2><p id="speedHelp" class="small" style="margin-top:.35rem"></p><div id="speedAnswers" class="answers"></div><div id="speedFeedback" class="feedback" role="status" aria-live="polite"></div><div class="actions"><button id="startSpeed" type="button"></button></div></div></div></section>

    <section id="stamp" class="screen"><div class="panel"><h2 id="stampTitle"></h2><p id="stampText" class="small" style="margin-top:.45rem"></p><div class="cards"><div class="mini"><h3>🛂</h3><div id="stampEmoji" class="big">—</div></div><div class="mini"><h3 id="souvenirLabel"></h3><div id="souvenirWord" class="big">—</div><p id="souvenirMeaning" class="small"></p></div><div class="mini"><h3 id="moneyLabelStamp"></h3><div id="stampMoney" class="big">€0</div></div></div><div class="actions"><button id="continueTrip" type="button"></button><button id="finishTrip" type="button" class="secondary"></button></div></div></section>

    <section id="end" class="screen"><div class="panel"><h2 id="endTitle"></h2><p id="endIntro" class="small" style="margin-top:.35rem"></p><div class="metricGrid"><div class="metric"><span class="tiny" id="endMoneyLabel"></span><strong id="endMoney">€0</strong></div><div class="metric"><span class="tiny" id="endStampLabel"></span><strong id="endStamps">0/4</strong></div><div class="metric"><span class="tiny" id="endKnownLabel"></span><strong id="endKnown">0</strong></div><div class="metric"><span class="tiny" id="endDueLabel"></span><strong id="endDue">0</strong></div></div><div class="cards"><div class="mini"><h3 id="routeTitle"></h3><div id="routeList" class="list"></div></div><div class="mini"><h3 id="souvenirsTitle"></h3><div id="souvenirList" class="list"></div></div><div class="mini"><h3 id="adviceTitle"></h3><p id="adviceText" class="small" style="margin-top:.35rem"></p></div></div><div class="actions"><button id="homeAgain" type="button"></button><button id="restartBtn" type="button" class="danger"></button></div></div></section>
  </main>
  <footer><p class="tiny">Pasaporte A1 · PWA · local-first · no account · no external libraries</p></footer>
</div>

, "youEarn": "Získavaš {reward}.", "correctAnswer": "Správna odpoveď je", "scheduled": "Naplánované na opakovanie: {when}.", "mastered": "Takmer uložené v pamäti.", "wrongQueue": "Lola dá toto slovo skoro späť do opakovania.", "speedTitle": "Rýchle kolo", "speedIntro": "30 sekúnd. Vyberaj rýchlo. Každá správna odpoveď dá 8 € × combo.", "startSpeed": "Spustiť rýchle kolo", "speedReady": "Pripravený/á na 30 sekúnd?", "speedHelp": "Chyby v rýchlom kole sa tiež opakujú.", "speedDone": "Rýchle kolo skončilo: {score} správne.", "speedToReview": "Ešte máš {count} okamžitých opakovaní pred pečiatkou.", "speedToStamp": "Teraz dostaneš pečiatku do pasu.", "stampTitle": "Pečiatka za {country}", "stampText": "Dokončil/a si destináciu. Tvoj pas rastie a tvoje slová tiež.", "souvenir": "Suvenírové slovo", "finish": "Koniec", "continueTrip": "Pokračovať", "endTitle": "Koniec cesty", "endIntro": "Tvoj výsledok, trasa a slová na neskôr.", "route": "Trasa", "souvenirs": "Suveníry", "todayAdvice": "Ďalší krok", "adviceText": "Zajtra zopakuj najmä slová v boxe 1 alebo 2. Krátke lekcie fungujú lepšie než jeden dlhý maratón.", "export": "Exportovať pokrok", "playAgain": "Hrať znova", "teacherMode": "Režim učiteľa", "progressCopied": "Pokrok bol skopírovaný do schránky.", "scene_basics_title": "Prvý kontakt", "scene_basics_setup": "Prichádzaš. Lola trénuje svoj najpriateľskejší úsmev, ako len papagáj vie.", "scene_hotel_title": "Na recepcii", "scene_hotel_setup": "Stojíš na recepcii. Všetko ide ľahšie so správnym slovom.", "scene_transport_title": "Doprava", "scene_transport_setup": "Hľadáš vlak, autobus alebo východ. Lola číta mapu hore nohami.", "scene_restaurant_title": "Reštaurácia", "scene_restaurant_setup": "Sedíš pri stole. Lola si už objednala chlieb s papagájím prízvukom.", "scene_market_title": "Na trhu", "scene_market_setup": "Trh vonia ovocím. Lola hlasno vyjednáva.", "scene_directions_title": "Pýtať sa na cestu", "scene_directions_setup": "Hľadáš správnu ulicu. Jedno slovo mô <script>
(()=>{
'use strict';
const $ = id => document.getElementById(id);
const WORDS = JSON.parse($('word-data').textContent);
const COUNTRIES = JSON.parse($('country-data').textContent);
const THEMES = JSON.parse($('theme-data').textContent);
const I18N = JSON.parse($('i18n-data').textContent);
const COUNTRY_IDS = Object.keys(COUNTRIES);
const WORD_BY_ID = Object.fromEntries(WORDS.map(w=>[w.id,w]));
const STORAGE_KEY = 'pasaporteA1PwaStateV6';
const DAY = 24*60*60*1000;
const intervals = [0, 0, 4*60*60*1000, DAY, 3*DAY, 7*DAY, 14*DAY];
let deferredInstallPrompt = null;
const todayKey = () => new Date().toISOString().slice(0,10);
const safe = s => String(s ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const euro = n => `€${Math.round(Number(n)||0)}`;
const norm = s => String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[¿?¡!.,;:]/g,'').replace(/^(el|la|los|las|un|una)\s+/i,'').trim();
const sample = arr => arr[Math.floor(Math.random()*arr.length)];
const shuffle = arr => arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1]);
function detectLang(){ const n=(navigator.language||'').toLowerCase(); if(n.startsWith('sk')) return 'sk'; if(n.startsWith('en')) return 'en'; return 'nl'; }
function defaultState(){ return {settings:{uiLang:detectLang(),learnLang:detectLang(),audio:true},money:500,combo:1,bestCombo:1,stamps:{},souvenirs:[],route:[],stats:{},trip:null,current:null,speed:null,daily:{date:todayKey(),goal:10,done:0,streak:0,lastActive:null},onboarded:false}; }
let state = loadState();
function loadState(){ try{ const raw=localStorage.getItem(STORAGE_KEY); if(!raw) return defaultState(); const loaded=JSON.parse(raw); return mergeDefaults(defaultState(), loaded); }catch(e){ return defaultState(); } }
function mergeDefaults(base, loaded){ for(const k of Object.keys(loaded||{})){ if(loaded[k] && typeof loaded[k]==='object' && !Array.isArray(loaded[k]) && base[k] && typeof base[k]==='object' && !Array.isArray(base[k])) base[k]=mergeDefaults(base[k], loaded[k]); else base[k]=loaded[k]; } return base; }
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function tr(key, vars={}){ const lang = state.settings.uiLang; let s = (I18N[lang]&&I18N[lang][key]) || (I18N.en&&I18N.en[key]) || key; return String(s).replace(/\{(\w+)\}/g, (_,k)=> vars[k] ?? ''); }
function wordMeaning(w){ return w[state.settings.learnLang] || w.en || w.nl; }
function themeName(theme){ return (THEMES[theme] && (THEMES[theme][state.settings.uiLang] || THEMES[theme].en)) || theme; }
function countryName(id){ const c=COUNTRIES[id]; return c.name[state.settings.uiLang] || c.name.en; }
function dueDateLabel(ms){ const d=new Date(ms); const now=new Date(); if(ms <= Date.now()+60000) return state.settings.uiLang==='en'?'now':state.settings.uiLang==='sk'?'teraz':'nu'; return d.toLocaleDateString(state.settings.uiLang==='sk'?'sk-SK':state.settings.uiLang==='en'?'en-GB':'nl-BE', {day:'2-digit',month:'2-digit'}); }
function ensureDaily(){ const today=todayKey(); if(state.daily.date !== today){ const yesterday = new Date(Date.now()-DAY).toISOString().slice(0,10); state.daily.streak = state.daily.done >= state.daily.goal && state.daily.date === yesterday ? (state.daily.streak||0)+1 : 0; state.daily.date=today; state.daily.done=0; } }
function markDaily(){ ensureDaily(); state.daily.done += 1; state.daily.lastActive=todayKey(); }
function statFor(id){ if(!state.stats[id]) state.stats[id]={box:0,dueAt:0,correct:0,wrong:0,seen:0,last:0}; return state.stats[id]; }
function knownCount(){ return WORDS.filter(w => (state.stats[w.id]?.box || 0) >= 4).length; }
function dueWords(){ const now=Date.now(); return WORDS.filter(w => { const s=state.stats[w.id]; return s && s.box>0 && s.box<5 && s.dueAt<=now; }); }
function immediateDueWordsForTrip(){ if(!state.trip) return dueWords(); const themes=COUNTRIES[state.trip.countryId].themes; return dueWords().filter(w=>themes.includes(w.theme)); }
function updateWord(correct, w){ const s=statFor(w.id); s.seen++; s.last=Date.now(); if(correct){ s.correct++; s.box=Math.min(5, Math.max(1,s.box)+1); s.dueAt=Date.now()+intervals[s.box]; } else { s.wrong++; s.box=1; s.dueAt=Date.now(); } }
function setScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id)); window.scrollTo({top:0,behavior:window.matchMedia('(prefers-reduced-motion: reduce)').matches?'auto':'smooth'}); }
function applyText(){ document.documentElement.lang = tr('htmlLang'); document.title = `${tr('appTitle')} — PWA`; $('appTitle').textContent=tr('appTitle'); $('tagline').textContent=tr('tagline'); $('version').textContent=tr('version'); $('installBtn').textContent=tr('install'); $('settingsBtn').textContent=tr('settings'); $('audioToggle').textContent=state.settings.audio?'🔊':'🔇';
['startTitle','startText','onboard1Title','onboard1Text','onboard2Title','onboard2Text','onboard3Title','onboard3Text','installHelp','homeTitle','mapIntro','howTitle','howText','reviewTitle','speedTitle','speedIntro','speedHelp','stampText','endTitle','endIntro','adviceText'].forEach(id=>{ if($(id)) $(id).textContent=tr(id==='homeTitle'?'home':id); });
$('startGame').textContent = state.onboarded ? tr('continueButton') : tr('startButton'); $('startSettings').textContent=tr('settings'); $('offlineReady').textContent=tr('offlineReady'); $('dailyGoalStart').textContent=tr('dailyGoal'); $('dailyGoalLabel').textContent=tr('dailyGoal'); $('streakLabel').textContent=tr('streak'); $('knownLabel').textContent=tr('knownWords'); $('dueLabel').textContent=tr('reviewDue'); $('finishBtn').textContent=tr('finish'); $('exportBtn').textContent=tr('export'); $('resetBtn').textContent=tr('reset'); $('chooseMc').textContent=tr('chooseMc'); $('chooseType').textContent=tr('chooseType'); $('speakWord').textContent='🔊 '+tr('listenWord'); $('speakSentence').textContent='🔊 '+tr('listenSentence'); $('nextQuestion').textContent=tr('next'); $('startSpeed').textContent=tr('startSpeed'); $('souvenirLabel').textContent=tr('souvenir'); $('moneyLabelStamp').textContent=tr('money'); $('continueTrip').textContent=tr('continueTrip'); $('finishTrip').textContent=tr('finish'); $('endMoneyLabel').textContent=tr('money'); $('endStampLabel').textContent=tr('stamps'); $('endKnownLabel').textContent=tr('knownWords'); $('endDueLabel').textContent=tr('reviewDue'); $('routeTitle').textContent=tr('route'); $('souvenirsTitle').textContent=tr('souvenirs'); $('adviceTitle').textContent=tr('todayAdvice'); $('homeAgain').textContent=tr('home'); $('restartBtn').textContent=tr('reset'); $('settingsTitle').textContent=tr('settings'); $('interfaceLabel').textContent=tr('interfaceLanguage'); $('learnLabel').textContent=tr('learningLanguage'); $('saveSettings').textContent=tr('save'); $('closeSettings').textContent=tr('close');
$('uiLang').value=state.settings.uiLang; $('learnLang').value=state.settings.learnLang; updateNetworkStatus(); updateHud(); }
function updateNetworkStatus(){ const online=navigator.onLine; $('netDot').classList.toggle('off',!online); $('netText').textContent=online?tr('online'):tr('offline'); }
function updateHud(){ ensureDaily(); const due=dueWords().length; $('hudMoney').textContent=euro(state.money); $('hudCombo').textContent=`x${state.combo.toFixed(2)}`; $('hudStamps').textContent=`${Object.keys(state.stamps).length}/${COUNTRY_IDS.length}`; $('hudDue').textContent=String(due); const pct=Math.min(100, Math.round(100*state.daily.done/state.daily.goal)); ['dailyBar','dailyStartBar','dailySideBar'].forEach(id=>$(id)&&($(id).style.width=pct+'%')); const dailyText=tr('dailyDone',{done:state.daily.done,goal:state.daily.goal}); ['dailyDone','dailyStartText','dailySide'].forEach(id=>$(id)&&($(id).textContent=dailyText)); $('streakValue').textContent=`${state.daily.streak} ${tr('days')}`; $('knownValue').textContent=`${knownCount()}/${WORDS.length}`; $('dueValue').textContent=String(due); }
function renderHome(){ applyText(); updateHud(); const container=$('countries'); container.innerHTML=COUNTRY_IDS.map(id=>{ const c=COUNTRIES[id]; const done=!!state.stamps[id]; const active=state.trip && state.trip.countryId===id; const themeTxt=c.themes.map(themeName).join(' · '); const disabled=state.trip && !active; return `<button type="button" class="countryCard ${done?'done':''}" style="background:${c.color}" data-country="${id}" ${disabled?'disabled':''} aria-label="${safe(active?tr('resumeTrip'):tr('travelTo'))} ${safe(countryName(id))}"><span><span class="flag" aria-hidden="true">${c.emoji}</span><br><strong>${safe(countryName(id))}</strong></span><span class="meta">${safe(tr('travelCost'))}: ${euro(c.cost)}<br>${safe(tr('theme'))}: ${safe(themeTxt)}${done?'<br>✅ '+safe(tr('visited')):''}</span><span class="meta">${safe(active?tr('resumeTrip'):tr('travelTo'))}</span></button>`; }).join(''); container.querySelectorAll('[data-country]').forEach(btn=>btn.addEventListener('click',()=>startCountry(btn.dataset.country))); renderReviewList(); setScreen('home'); save(); }
function renderReviewList(){ const due=dueWords(); const list=$('reviewList'); if(!due.length){ list.innerHTML=`<div class="item small">${safe(tr('reviewEmpty'))}</div>`; return; } list.innerHTML=due.slice(0,8).map(w=>{ const s=statFor(w.id); return `<div class="item"><strong>${safe(w.es)}</strong><br>${safe(wordMeaning(w))} · ${safe(tr('reviewItem',{box:s.box,date:dueDateLabel(s.dueAt)}))}</div>`; }).join(''); }
function startCountry(id){ if(state.trip && state.trip.countryId===id){ return nextQuestionFlow(); } if(state.trip) return; const c=COUNTRIES[id]; if(state.money<c.cost){ alert(tr('notEnough',{name:countryName(id),cost:euro(c.cost),money:euro(state.money)})); return; } state.money-=c.cost; state.trip={countryId:id,answered:0,phase:'normal',earned:0,speedScore:0}; state.route.push({id,paid:c.cost,earned:0,speedScore:0,date:todayKey()}); save(); nextQuestionFlow(); }
function selectQuestionWord(){ const due=immediateDueWordsForTrip(); if(due.length) return {word:sample(due),isReview:true}; const themes=COUNTRIES[state.trip.countryId].themes; const pool=WORDS.filter(w=>themes.includes(w.theme)); const sorted=shuffle(pool).sort((a,b)=>((state.stats[a.id]?.seen||0)-(state.stats[b.id]?.seen||0)) || ((state.stats[a.id]?.box||0)-(state.stats[b.id]?.box||0))); return {word:sorted[0]||sample(WORDS),isReview:false}; }
function nextQuestionFlow(){ if(!state.trip) return renderHome(); if(state.trip.answered>=5) return renderSpeedIntro(); const q=selectQuestionWord(); state.current={wordId:q.word.id,isReview:q.isReview,mode:null,answered:false}; renderQuestion(); }
function sceneTitle(theme){ return tr(`scene_${theme}_title`); } function sceneSetup(theme){ return tr(`scene_${theme}_setup`); }
function renderQuestion(){ applyText(); const w=WORD_BY_ID[state.current.wordId]; const c=COUNTRIES[state.trip.countryId]; $('scenarioEmoji').textContent=c.emoji; $('scenarioTitle').textContent = (state.current.isReview ? tr('reviewMode')+' · ' : '') + sceneTitle(w.theme); $('scenarioSetup').textContent=sceneSetup(w.theme); $('questionMeta').textContent = `${c.emoji} ${countryName(state.trip.countryId)} · ${state.current.isReview?tr('reviewMode'):tr('questionOf',{current:state.trip.answered+1})}`; $('sentence').textContent=w.sentence; $('prompt').innerHTML=`${safe(tr('prompt'))} <span class="meaning">${safe(wordMeaning(w))}</span>?`; $('modeChooser').classList.remove('hidden'); $('answerArea').innerHTML=''; $('feedback').className='feedback'; $('feedback').innerHTML=''; $('nextBox').classList.add('hidden'); const s=statFor(w.id); $('wordBoxTitle').textContent=`🧠 Box ${s.box||0}`; $('wordBox').textContent=s.box?tr('reviewItem',{box:s.box,date:dueDateLabel(s.dueAt)}):tr('newWord'); setScreen('question'); save(); }
function chooseMode(mode){ state.current.mode=mode; $('modeChooser').classList.add('hidden'); const w=WORD_BY_ID[state.current.wordId]; if(mode==='mc'){ const opts=shuffle([w.es,...w.distractors, ...shuffle(WORDS.filter(x=>x.id!==w.id).map(x=>x.es)).slice(0,3)]).filter((v,i,a)=>a.indexOf(v)===i).slice(0,4); $('answerArea').innerHTML=`<p class="small">${safe(tr('mcInstruction'))}</p><div class="answers">${opts.map(o=>`<button type="button" class="choice" data-answer="${safe(o)}">${safe(o)}</button>`).join('')}</div>`; $('answerArea').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>evaluate(b.dataset.answer))); } else { $('answerArea').innerHTML=`<p class="small">${safe(tr('typeInstruction'))}</p><div class="typeRow"><input id="typedAnswer" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="${safe(tr('typePlaceholder'))}"><button id="checkTyped" type="button">${safe(tr('check'))}</button></div>`; $('checkTyped').addEventListener('click',()=>evaluate($('typedAnswer').value)); $('typedAnswer').addEventListener('keydown',e=>{ if(e.key==='Enter') evaluate($('typedAnswer').value); }); $('typedAnswer').focus(); } save(); }
function evaluate(raw){ if(!state.current || state.current.answered) return; const w=WORD_BY_ID[state.current.wordId]; const correct=norm(raw)===norm(w.es); state.current.answered=true; markDaily(); let base=state.current.mode==='type'?25:10; if(correct){ state.combo=Math.min(3,state.combo+.15); state.bestCombo=Math.max(state.bestCombo,state.combo); const reward=Math.round(base*state.combo); state.money+=reward; if(state.trip) state.trip.earned+=reward; const last=state.route[state.route.length-1]; if(last) last.earned+=reward; updateWord(true,w); $('feedback').className='feedback show good'; $('feedback').innerHTML=`<strong>✅ ${safe(tr('correct'))}</strong><br>${safe(w.es)} = ${safe(wordMeaning(w))}. ${safe(tr('youEarn',{reward:euro(reward)}))}<br>${safe(tr(statFor(w.id).box>=5?'mastered':'scheduled',{when:dueDateLabel(statFor(w.id).dueAt)}))}`; } else { state.combo=1; updateWord(false,w); $('feedback').className='feedback show bad'; $('feedback').innerHTML=`<strong>❌ ${safe(tr('wrong'))}</strong><br>${safe(tr('correctAnswer'))} <strong>${safe(w.es)}</strong> = ${safe(wordMeaning(w))}.<br>${safe(tr('wrongQueue'))}`; } if(!state.current.isReview) state.trip.answered++; $('answerArea').querySelectorAll('button,input').forEach(el=>el.disabled=true); $('nextBox').classList.remove('hidden'); updateHud(); renderReviewList(); save(); }
function afterQuestion(){ if(!state.trip) return renderHome(); const dueNow=immediateDueWordsForTrip(); if(dueNow.length) return nextQuestionFlow(); if(state.trip.answered>=5) return renderSpeedIntro(); nextQuestionFlow(); }
function renderSpeedIntro(){ applyText(); $('timer').textContent='30'; $('speedQuestion').textContent=tr('speedReady'); $('speedAnswers').innerHTML=''; $('speedFeedback').className='feedback'; $('speedFeedback').innerHTML=''; $('startSpeed').classList.remove('hidden'); state.speed={left:30,score:0,timer:null,active:false,wordId:null}; setScreen('speed'); save(); }
function speedPool(){ const themes=COUNTRIES[state.trip.countryId].themes; return WORDS.filter(w=>themes.includes(w.theme)); }
function startSpeed(){ if(!state.speed) state.speed={left:30,score:0,timer:null,active:false}; state.speed.active=true; state.speed.left=30; state.speed.score=0; $('startSpeed').classList.add('hidden'); speedAsk(); if(state.speed.timer) clearInterval(state.speed.timer); state.speed.timer=setInterval(()=>{ state.speed.left--; $('timer').textContent=state.speed.left; if(state.speed.left<=0) finishSpeed(); },1000); }
function speedAsk(){ const w=sample(speedPool()); state.speed.wordId=w.id; $('timer').textContent=state.speed.left; $('speedQuestion').innerHTML=`${safe(tr('prompt'))} <span class="meaning">${safe(wordMeaning(w))}</span>?`; const opts=shuffle([w.es,...w.distractors,...shuffle(WORDS.filter(x=>x.id!==w.id).map(x=>x.es)).slice(0,2)]).filter((v,i,a)=>a.indexOf(v)===i).slice(0,4); $('speedAnswers').innerHTML=opts.map(o=>`<button type="button" class="choice" data-answer="${safe(o)}">${safe(o)}</button>`).join(''); $('speedAnswers').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>speedAnswer(b.dataset.answer))); }
function speedAnswer(raw){ if(!state.speed?.active) return; const w=WORD_BY_ID[state.speed.wordId]; const ok=norm(raw)===norm(w.es); markDaily(); if(ok){ const reward=Math.round(8*state.combo); state.money+=reward; state.speed.score++; if(state.trip) state.trip.earned+=reward; const last=state.route[state.route.length-1]; if(last) last.earned+=reward; updateWord(true,w); $('speedFeedback').className='feedback show good'; $('speedFeedback').textContent=`+${euro(reward)} · ${w.es} = ${wordMeaning(w)}`; } else { state.combo=1; updateWord(false,w); $('speedFeedback').className='feedback show bad'; $('speedFeedback').textContent=`${w.es} = ${wordMeaning(w)}`; } updateHud(); save(); speedAsk(); }
function finishSpeed(){ if(!state.speed) return; clearInterval(state.speed.timer); state.speed.active=false; const score=state.speed.score; if(state.trip) state.trip.speedScore=score; const last=state.route[state.route.length-1]; if(last) last.speedScore=score; $('speedAnswers').innerHTML=''; $('speedQuestion').textContent=tr('speedDone',{score}); const due=immediateDueWordsForTrip().length; $('speedHelp').textContent=due?tr('speedToReview',{count:due}):tr('speedToStamp'); $('speedFeedback').className='feedback'; $('startSpeed').classList.add('hidden'); save(); setTimeout(()=>{ due?nextQuestionFlow():awardStamp(); },900); }
function awardStamp(){ const id=state.trip.countryId; const c=COUNTRIES[id]; state.stamps[id]=Date.now(); const souvenirId=c.souvenir; const word=WORD_BY_ID[souvenirId] || sample(WORDS); if(!state.souvenirs.some(s=>s.id===word.id)) state.souvenirs.push({id:word.id,country:id}); $('stampTitle').textContent=tr('stampTitle',{country:countryName(id)}); $('stampEmoji').textContent=c.emoji; $('souvenirWord').textContent=word.es; $('souvenirMeaning').textContent=wordMeaning(word); $('stampMoney').textContent=euro(state.money); state.trip=null; state.current=null; state.speed=null; updateHud(); save(); setScreen('stamp'); }
function renderEnd(){ applyText(); $('endMoney').textContent=euro(state.money); $('endStamps').textContent=`${Object.keys(state.stamps).length}/${COUNTRY_IDS.length}`; $('endKnown').textContent=`${knownCount()}/${WORDS.length}`; $('endDue').textContent=String(dueWords().length); $('routeList').innerHTML=state.route.length?state.route.map((r,i)=>`<div class="item">${i+1}. ${COUNTRIES[r.id].emoji} <strong>${safe(countryName(r.id))}</strong><br>${safe(tr('travelCost'))}: ${euro(r.paid)} · +${euro(r.earned)} · ⚡ ${r.speedScore||0}</div>`).join(''):`<div class="item small">—</div>`; $('souvenirList').innerHTML=state.souvenirs.length?state.souvenirs.map(s=>{ const w=WORD_BY_ID[s.id]; return `<div class="item">${COUNTRIES[s.country]?.emoji||'🎁'} <strong>${safe(w.es)}</strong><br>${safe(wordMeaning(w))}</div>`; }).join(''):`<div class="item small">—</div>`; setScreen('end'); save(); }
function restart(){ if(!confirm(tr('resetConfirm'))) return; localStorage.removeItem(STORAGE_KEY); state=defaultState(); applyText(); renderHome(); }
function exportProgress(){ const report={exportedAt:new Date().toISOString(),known:knownCount(),due:dueWords().length,money:state.money,stamps:Object.keys(state.stamps).length,totalWords:WORDS.length,stats:state.stats}; const txt=JSON.stringify(report,null,2); if(navigator.clipboard) navigator.clipboard.writeText(txt).then(()=>alert(tr('progressCopied'))).catch(()=>downloadText(txt)); else downloadText(txt); }
function downloadText(txt){ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([txt],{type:'application/json'})); a.download='pasaporte-a1-progress.json'; a.click(); URL.revokeObjectURL(a.href); }
function speak(text){ if(!state.settings.audio) return; if(!('speechSynthesis' in window)){ alert(tr('audioUnavailable')); return; } const u=new SpeechSynthesisUtterance(text); u.lang='es-ES'; u.rate=.86; const voices=speechSynthesis.getVoices(); const voice=voices.find(v=>/es[-_](ES|MX|AR)/i.test(v.lang)) || voices.find(v=>/^es/i.test(v.lang)); if(voice) u.voice=voice; speechSynthesis.cancel(); speechSynthesis.speak(u); }
function openSettings(){ $('uiLang').value=state.settings.uiLang; $('learnLang').value=state.settings.learnLang; $('settingsDialog').showModal(); }
function saveSettings(){ state.settings.uiLang=$('uiLang').value; state.settings.learnLang=$('learnLang').value; save(); applyText(); renderReviewList(); if($('home').classList.contains('active')) renderHome(); if($('question').classList.contains('active')) renderQuestion(); $('settingsDialog').close(); }
function registerSW(){ if('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(()=>{}); }
window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferredInstallPrompt=e; $('installBtn').disabled=false; });
$('installBtn').addEventListener('click', async()=>{ if(deferredInstallPrompt){ deferredInstallPrompt.prompt(); await deferredInstallPrompt.userChoice; deferredInstallPrompt=null; } else alert(tr('installHelp')); });
$('settingsBtn').addEventListener('click',openSettings); $('startSettings').addEventListener('click',openSettings); $('closeSettings').addEventListener('click',()=>$('settingsDialog').close()); $('saveSettings').addEventListener('click',saveSettings); $('audioToggle').addEventListener('click',()=>{ state.settings.audio=!state.settings.audio; if(!state.settings.audio && 'speechSynthesis' in window) speechSynthesis.cancel(); save(); applyText(); }); $('startGame').addEventListener('click',()=>{ state.onboarded=true; save(); renderHome(); }); $('chooseMc').addEventListener('click',()=>chooseMode('mc')); $('chooseType').addEventListener('click',()=>chooseMode('type')); $('nextQuestion').addEventListener('click',afterQuestion); $('startSpeed').addEventListener('click',startSpeed); $('continueTrip').addEventListener('click',renderHome); $('finishTrip').addEventListener('click',renderEnd); $('finishBtn').addEventListener('click',renderEnd); $('homeAgain').addEventListener('click',renderHome); $('restartBtn').addEventListener('click',restart); $('resetBtn').addEventListener('click',restart); $('exportBtn').addEventListener('click',exportProgress); $('speakWord').addEventListener('click',()=>{ if(state.current) speak(WORD_BY_ID[state.current.wordId].es); }); $('speakSentence').addEventListener('click',()=>{ if(state.current) speak(WORD_BY_ID[state.current.wordId].sentence); }); window.addEventListener('online',updateNetworkStatus); window.addEventListener('offline',updateNetworkStatus); window.addEventListener('error', e=>{ const box=$('fatal'); box.style.display='block'; box.innerHTML=`<strong>App startte niet volledig.</strong><br><span class="small">${safe(e.message)}</span>`; });
window.PASAPORTE_TEST={getState:()=>state, words:WORDS, dueWords, renderHome, startCountry, chooseMode, evaluate};
ensureDaily(); applyText(); registerSW(); if(state.onboarded) renderHome(); else setScreen('start');
})();
</script>
